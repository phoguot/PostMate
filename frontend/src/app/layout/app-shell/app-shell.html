<div class="flex h-screen w-full overflow-hidden bg-[var(--color-surface)]">
  <aside class="flex w-64 shrink-0 flex-col bg-[var(--color-sidebar)] text-slate-300">
    <div class="flex items-center gap-2 px-5 py-5">
      <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-[var(--color-brand)] text-sm font-bold text-white">P</div>
      <span class="text-lg font-semibold text-white">PostMate</span>
    </div>

    <nav class="flex-1 overflow-y-auto px-3 pb-4">
      <ul class="flex flex-col gap-1">
        @for (item of mainNav; track item.route) {
          <li>
            <a
              [routerLink]="item.route"
              routerLinkActive="bg-[var(--color-brand)] text-white"
              class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-300 hover:bg-[var(--color-sidebar-hover)] hover:text-white"
            >
              <app-icon [icon]="item.icon" [size]="18" />
              {{ item.label }}
            </a>
          </li>
        }
      </ul>

      <p class="mb-2 mt-6 px-3 text-xs font-semibold tracking-wide text-slate-500">FACEBOOK</p>
      <ul class="flex flex-col gap-1">
        @for (item of facebookNav; track item.route) {
          <li>
            <a
              [routerLink]="item.route"
              routerLinkActive="bg-[var(--color-brand)] text-white"
              class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-300 hover:bg-[var(--color-sidebar-hover)] hover:text-white"
            >
              <app-icon [icon]="item.icon" [size]="18" />
              {{ item.label }}
            </a>
          </li>
        }
      </ul>

      <ul class="mt-6 flex flex-col gap-1">
        @for (item of bottomNav; track item.route) {
          <li>
            <a
              [routerLink]="item.route"
              routerLinkActive="bg-[var(--color-brand)] text-white"
              class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm font-medium text-slate-300 hover:bg-[var(--color-sidebar-hover)] hover:text-white"
            >
              <app-icon [icon]="item.icon" [size]="18" />
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
    </nav>

    <div class="relative border-t border-slate-700/60 px-3 py-3">
      <button type="button" class="flex w-full items-center gap-2 rounded-lg px-2 py-2 hover:bg-[var(--color-sidebar-hover)]" (click)="toggleMenu()">
        <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-slate-600 text-sm font-semibold text-white">
          {{ (auth.currentUser()?.fullName ?? auth.currentUser()?.username ?? '?').charAt(0).toUpperCase() }}
        </div>
        <div class="min-w-0 flex-1 text-left">
          <p class="truncate text-sm font-medium text-white">{{ auth.currentUser()?.fullName ?? auth.currentUser()?.username }}</p>
          <p class="truncate text-xs text-slate-400">{{ auth.currentUser()?.role ?? 'Member' }}</p>
        </div>
        <app-icon [icon]="chevronDown" [size]="16" />
      </button>

      @if (menuOpen()) {
        <div class="absolute bottom-full left-3 right-3 mb-2 overflow-hidden rounded-lg border border-slate-700 bg-slate-800 shadow-lg">
          <button
            type="button"
            class="flex w-full items-center gap-2 px-3 py-2 text-left text-sm text-slate-200 hover:bg-slate-700"
            (click)="logout()"
          >
            <app-icon [icon]="logOutIcon" [size]="16" />
            Đăng xuất
          </button>
        </div>
      }
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto px-8 py-6">
    <router-outlet />
  </main>
</div>
