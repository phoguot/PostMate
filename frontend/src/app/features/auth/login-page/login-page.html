<div class="flex min-h-screen items-center justify-center bg-[var(--color-surface)] px-4">
  <div class="w-full max-w-sm rounded-2xl border border-gray-200 bg-white p-8 shadow-sm">
    <div class="mb-6 flex flex-col items-center gap-2">
      <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-[var(--color-brand)] text-lg font-bold text-white">P</div>
      <h1 class="text-xl font-semibold text-gray-900">Đăng nhập PostMate</h1>
      <p class="text-sm text-gray-500">Quản lý và tự động đăng bài Facebook</p>
    </div>

    <form class="flex flex-col gap-4" (ngSubmit)="submit()">
      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700" for="username">Tên đăng nhập</label>
        <input
          id="username"
          name="username"
          type="text"
          autocomplete="username"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm outline-none focus:border-[var(--color-brand)] focus:ring-1 focus:ring-[var(--color-brand)]"
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
        />
      </div>
      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700" for="password">Mật khẩu</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm outline-none focus:border-[var(--color-brand)] focus:ring-1 focus:ring-[var(--color-brand)]"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
        />
      </div>

      @if (errorMessage()) {
        <p class="rounded-lg bg-[var(--color-status-danger-bg)] px-3 py-2 text-sm text-[var(--color-status-danger)]">
          {{ errorMessage() }}
        </p>
      }

      <button
        type="submit"
        class="mt-2 flex items-center justify-center rounded-lg bg-[var(--color-brand)] px-4 py-2.5 text-sm font-medium text-white transition hover:bg-[var(--color-brand-light)] disabled:opacity-60"
        [disabled]="loading()"
      >
        {{ loading() ? 'Đang đăng nhập...' : 'Đăng nhập' }}
      </button>
    </form>
  </div>
</div>
